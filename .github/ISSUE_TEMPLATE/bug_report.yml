name: Bug report
description: Report a reproducible defect.
title: "[Bug]: "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Keep the report factual and reproducible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: The app crashes when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path to reproduce.
      placeholder: |
        1. Go to...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - production blocked
        - P1 - critical workflow broken
        - P2 - important but workaround exists
        - P3 - minor polish
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, console output, affected URLs, or files.
    validations:
      required: false
