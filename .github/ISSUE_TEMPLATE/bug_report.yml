name: 버그 신고
description: 재현 가능한 결함을 신고합니다.
title: "[버그]: "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        버그를 알려주셔서 감사합니다. 사실 위주로, 재현 가능하게 작성해 주세요.
  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 무엇이 잘못되었나요?
      placeholder: 앱이 특정 화면에서 멈춥니다...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 재현하는 가장 짧은 경로를 적어 주세요.
      placeholder: |
        1. ... 화면으로 이동
        2. ... 버튼 클릭
        3. ... 문제가 발생
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래는 어떤 일이 일어나야 하나요?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로는 어떤 일이 일어났나요?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - P0 - 운영 환경 차단
        - P1 - 핵심 흐름 깨짐
        - P2 - 중요하지만 우회 가능
        - P3 - 작은 개선
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 증거
      description: 스크린샷, 로그, 콘솔 출력, 관련 URL 또는 파일을 적어 주세요.
    validations:
      required: false
